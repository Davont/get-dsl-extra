<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get DSL Extra - 调试模式</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      background: #e8e8e8;
      padding-top: 80px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .debug-wrapper {
      border: 2px dashed #999;
      border-radius: 8px;
      padding: 8px;
      background: #fff;
    }
    .debug-label {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    /* 模拟 Chrome 插件弹窗的尺寸 */
    iframe {
      width: 320px;
      height: 260px;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="debug-wrapper">
    <div class="debug-label">调试模式 - 模拟插件弹窗</div>
    <iframe src="./popup/index.html"></iframe>
  </div>
</body>
</html>
